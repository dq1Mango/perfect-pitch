<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Audio Fourier Analysis</title>
		<link rel="stylesheet" href="/style.css">
		<script src="main.js"></script>
	</head>
	<body>
		<div class="container">
			<h1>Audio Fourier Analysis</h1>

			<div class="file-input-section">
				<h3>Select Audio File</h3>
				<input type="file" id="audioFile" class="file-input" accept="audio/*">
				<p>Supports MP3, WAV, M4A, and other common audio formats</p>
			</div>

			<div class="controls">
				<button id="playButton" disabled>Play</button>
				<button id="pauseButton" disabled>Pause</button>
				<button id="analyzeButton" disabled>Analyze</button>
			</div>

			<div class="info-panel hidden" id="audioInfo">
				<h4>Audio Information</h4>
				<div id="audioDetails"></div>
			</div>

			<div class="analysis-section">
				<h3>Spectrogram</h3>
				<div class="canvas-container">
					<canvas id="spectrogram" class="spectrogram"></canvas>
				</div>
				<!--Sliders-->
				<div class="slider-row">
					<div class="slider-label">Maximum Frequency <span id="val-max-freq">kHz</span></div>
					<input type="range" id="max-freq" min="1" max="22" value="22" step="0.1">
				</div>
				<div class="slider-row">
					<div class="slider-label">Maximum Decibals <span id="val-min-db">Db</span></div>
					<input type="range" id="min-db" min="-100" max="-60" value="-80" step="0.1">
				</div>
				<div class="slider-row">
					<div class="slider-label">Minimum Decibals <span id="val-max-db">Db</span></div>
					<input type="range" id="max-db" min="-40" max="0" value="-20" step="0.1">
				</div>

				<!--End Sliders-->

				<h3>Frequency Spectrum Analysis</h3>
				<div class="canvas-container">
					<canvas id="frequencyCanvas" width="1000" height="400"></canvas>
				</div>
			</div>
		</div>

		<!-- <script src="/script.js"> -->
	</body>
</html>
